apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: frontend

spec:
  replicas: 1

  selector:
    matchLabels:
      app: frontend

  template:
    metadata:
      labels:
        app: frontend

    spec:
      containers:
      - name: frontend
        image: dipakrasal2009/devops-healthcheck-ui:latest

        imagePullPolicy: Always

        ports:
        - containerPort: 80

        # Override the two files baked into the image so the frontend
        # calls the backend via a same-origin reverse proxy instead of
        # a hardcoded ":8080" URL (which cannot work behind an OpenShift Route).
        volumeMounts:
        - name: nginx-conf
          mountPath: /etc/nginx/conf.d/default.conf
          subPath: default.conf
        - name: ui-html
          mountPath: /usr/share/nginx/html/index.html
          subPath: index.html

      volumes:
      - name: nginx-conf
        configMap:
          name: frontend-nginx-conf
      - name: ui-html
        configMap:
          name: frontend-ui-html
