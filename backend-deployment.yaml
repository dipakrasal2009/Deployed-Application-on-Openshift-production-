apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: backend

spec:
  replicas: 1

  selector:
    matchLabels:
      app: backend

  template:
    metadata:
      labels:
        app: backend

    spec:
      containers:
      - name: backend
        image: dipakrasal2009/devops-healthcheck-app:latest

        imagePullPolicy: Always

        ports:
        - containerPort: 8080

        env:

        - name: DB_HOST
          value: postgres.database.svc.cluster.local

        - name: DB_PORT
          value: "5432"

        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: POSTGRES_USER

        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: POSTGRES_PASSWORD

        - name: DB_NAME
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: POSTGRES_DB
