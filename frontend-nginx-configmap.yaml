apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-nginx-conf
  namespace: frontend
data:
  default.conf: |
    server {
        listen 80;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        # Serve the static frontend app
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Reverse proxy: browser calls /api/... on the SAME origin,
        # Nginx forwards it to the backend Service inside the cluster.
        # This avoids the browser ever needing to resolve
        # *.svc.cluster.local, which it cannot do.
        location /api/ {
            proxy_pass http://backend.backend.svc.cluster.local:8080/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
