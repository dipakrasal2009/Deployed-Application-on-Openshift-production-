# NOTE: Kubernetes/OpenShift Secrets are namespace-scoped, so this Secret
# must exist here in the "backend" namespace too (backend-deployment.yaml
# reads it via secretKeyRef in this namespace). It intentionally mirrors
# postgres-secret.yaml in the "database" namespace.
#
# IMPORTANT: if you ever rotate these credentials, update BOTH copies
# (database namespace AND backend namespace) or the backend will fail
# to authenticate against PostgreSQL.
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: backend
type: Opaque
stringData:
  POSTGRES_USER: admin
  POSTGRES_PASSWORD: admin123
  POSTGRES_DB: healthcheck
